<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EchoLink | Chat</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            margin: 0;
            padding: 0;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #1f1f1f;
            padding: 15px 30px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
        }

        .app-title {
            font-size: 24px;
            font-weight: 700;
            color: #00bcd4;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .welcome-text {
            font-size: 16px;
        }

        .logout-btn {
            background-color: #f44336;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            text-decoration: none;
            font-weight: bold;
            transition: background-color 0.3s;
        }

        .logout-btn:hover {
            background-color: #d32f2f;
        }

        .chat-container {
            max-width: 700px;
            margin: 30px auto;
            padding: 20px;
        }

        .messages-box {
            background-color: #1e1e1e;
            padding: 20px;
            height: 400px;
            overflow-y: auto;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.3);
        }

        .chat-message {
            background-color: #2c2c2c;
            padding: 10px 15px;
            border-radius: 8px;
            margin: 8px 0;
            color: #fff;
            animation: fadeIn 0.3s ease-in-out;
        }

        .system-message {
            color: #aaaaaa;
            font-style: italic;
            text-align: center;
            margin: 10px 0;
        }

        .chat-form {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .chat-form input[type="text"],
        .chat-form input[type="file"] {
            flex: 1;
            padding: 10px;
            border: 1px solid #444;
            border-radius: 6px;
            background-color: #2c2c2c;
            color: #fff;
        }

        .chat-form button {
            padding: 10px 20px;
            background-color: #00bcd4;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .chat-form button:hover {
            background-color: #00acc1;
        }

        .download-link {
            color: #03a9f4;
            text-decoration: none;
            margin-left: 10px;
        }

        .download-link:hover {
            text-decoration: underline;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="app-title">EchoLink</div>
        <div class="user-info">
            <span class="welcome-text">Welcome, {{ username }}</span>
            <a href="{{ url_for('logout') }}" class="logout-btn">Logout</a>
        </div>
    </nav>

    <main class="chat-container">
        <div id="messages" class="messages-box"></div>
        <form id="messageForm" class="chat-form" onsubmit="sendMessage(event)">
            <input type="text" id="messageInput" placeholder="Type your message..." required>
            <button type="submit">Send</button>
        </form>
        <form id="uploadForm" enctype="multipart/form-data" class="chat-form">
            <input type="file" id="fileInput" name="file" required>
            <button type="submit">Upload File</button>
        </form>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <script>
        var socket = io();
        socket.emit('join', {username: "{{ username }}"});
        const messagesDiv = document.getElementById('messages');
        const messageInput = document.getElementById('messageInput');

        function sendMessage(event) {
            event.preventDefault();
            const message = messageInput.value;
            socket.emit('message', message);
            messageInput.value = '';}

        socket.on('join_announcement', function(msg) {
            const p = document.createElement('p');
            p.textContent = msg;
            p.className = 'system-message';
            messagesDiv.appendChild(p);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;});

        socket.on('leave_announcement', function(msg) {
            const p = document.createElement('p');
            p.textContent = msg;
            p.className = 'system-message';
            messagesDiv.appendChild(p);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;});

        socket.on('message', function(msg) {
            const p = document.createElement('p');
            p.innerHTML = msg;
            p.className = 'chat-message';
            messagesDiv.appendChild(p);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;});

        document.getElementById('uploadForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const formData = new FormData();
            const fileInput = document.getElementById('fileInput');

            if (fileInput.files.length === 0) {
                alert('Please select a file first');
                return;}
            formData.append('file', fileInput.files[0]);

            fetch('/upload', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    var fileMessage = `uploaded: ${data.filename} <a href="/download/${data.filename}" class="download-link" target="_blank">Download</a>`;
                    socket.send(fileMessage);
                    fileInput.value = '';
                } else {
                    alert('Upload failed: ' + data.error);}
            })
            .catch(error => {
                console.error('Error:', error);
                alert('Upload error');
            });
        });
    </script>
</body>
</html>
